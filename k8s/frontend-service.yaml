apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: weekly-report
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: weekly-report-system
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
      protocol: TCP
      name: http
