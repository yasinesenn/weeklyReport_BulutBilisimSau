# Tum uygulama environment degiskenleri bu Secret'tan cekilir.
# Lokal Docker ortaminda docker-compose.yml uzerinden yonetilir.
# Kubernetes ortaminda bu dosyayi kubectl apply ile uygulayiniz.
apiVersion: v1
kind: Secret
metadata:
  name: weeklyreport-dev-secret
  namespace: weeklyreport-dev
  labels:
    app: weeklyreport-dev
type: Opaque
stringData:
  # ---- App ----
  NODE_ENV: "production"
  PORT: "5000"
  JWT_SECRET: "<BURAYA_JWT_SECRET_GIRINIZ>"

  # ---- Database ----
  DB_ADAPTER: "postgresql"
  DB_HOST: "<DB_HOST>"
  DB_PORT: "5432"
  DB_NAME: "<DB_NAME>"
  DB_USER: "<DB_USER>"
  DB_PASSWORD: "<DB_PASSWORD>"

  # ---- LDAP (Authentication - Prod) ----
  LDAP_ENABLED: "true"
  LDAP_URL: "<LDAP_URL>"
  LDAP_BIND_DN: "<LDAP_BIND_DN>"
  LDAP_BIND_PASSWORD: "<LDAP_BIND_PASSWORD>"
  LDAP_SEARCH_BASE: "<LDAP_SEARCH_BASE>"
  LDAP_SEARCH_FILTER: "(sAMAccountName={{username}})"
  LDAP_GROUP_ATTRIBUTE: "memberOf"

  # ---- LDAP (Role/Group Lookup - Test) ----
  # Bos birakirsan auth LDAP'taki gruplar kullanilir
  LDAP_ROLE_URL: "<LDAP_ROLE_URL>"
  LDAP_ROLE_BIND_DN: "<LDAP_ROLE_BIND_DN>"
  LDAP_ROLE_BIND_PASSWORD: "<LDAP_ROLE_BIND_PASSWORD>"
  LDAP_ROLE_SEARCH_BASE: "<LDAP_ROLE_SEARCH_BASE>"
  LDAP_ROLE_SEARCH_FILTER: "(sAMAccountName={{username}})"
